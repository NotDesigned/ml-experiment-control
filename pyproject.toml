[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ml-experiment-control"
version = "0.1.0"
description = "Durable ML experiment backends and project-adapter contracts"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [{name = "ELF contributors"}]
dependencies = []

[project.scripts]
experiment-safe-sco = "experiment_control.safe_sco:main"

[tool.setuptools.packages.find]
where = ["src"]
