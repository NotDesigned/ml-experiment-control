name: quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.10"
          version: "0.11.28"
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt
      - run: uv sync --locked --all-packages
      - run: cargo fmt --manifest-path rust/Cargo.toml -- --check
      - run: cargo clippy --locked --manifest-path rust/Cargo.toml -- -D warnings
      - run: cargo test --locked --manifest-path rust/Cargo.toml
      - run: uv run mypy
      - run: uv run python tools/coverage_gate.py
      - run: uv run python tools/generate_cli_reference.py --check
      - run: uv run python -m compileall -q src tests tools examples
      - run: uv run --package ml-experiment-server python -m compileall -q server/src server/tests
      - run: uv run --package ml-experiment-server pytest server/tests -q
      - run: uv run --package ml-experiment-server ml-expd --help
      - run: uv build --all-packages
