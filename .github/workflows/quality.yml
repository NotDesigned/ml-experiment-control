name: quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.10"
          version: "0.11.28"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python tools/coverage_gate.py
      - run: uv run python tools/generate_cli_reference.py --check
      - run: uv run python -m compileall -q src tests tools examples
      - run: uv build
