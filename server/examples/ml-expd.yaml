schema_version: 1
index_db: ~/.local/state/ml-expd/index.sqlite
project_registry_root: ~/.local/state/ml-expd/projects
action_root: ~/.local/state/ml-expd/actions
action_runtime:
  allow_project_writes: false
  allow_scheduler_mutations: false
  timeout_seconds: 300
  gate_ttl_seconds: 1800
telemetry:
  enabled: false
observability:
  log_archive_root: ~/.local/state/ml-expd/logs
  credential_root: ~/.local/state/ml-expd/credentials
  local_wandb:
    # Disabled by default. When enabled, the foreground command must bind all
    # three placeholders so daemon ownership, storage, and readiness agree.
    enabled: false
    managed: true
    bind_host: 127.0.0.1
    port: 8080
    data_dir: ~/.local/state/ml-expd/wandb
    # No universal W&B/Docker command can guarantee process-tree ownership.
    # Supply an attached foreground wrapper with all three placeholders only
    # after its signal/cleanup behavior has been reviewed.
    command: []
  wandb_cloud:
    # Reserved policy only. No cloud publisher exists in this release, so no
    # cloud-sync operation or credential-write API is exposed.
    enabled: false
    default_credential_ref: wandb-cloud-default
collector_enabled: true
poll_interval_seconds: 20
projects: []
