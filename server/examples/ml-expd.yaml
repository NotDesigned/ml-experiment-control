schema_version: 1
index_db: ~/.local/state/ml-expd/index.sqlite
project_registry_root: ~/.local/state/ml-expd/projects
action_root: ~/.local/state/ml-expd/actions
action_runtime:
  allow_project_writes: false
  allow_scheduler_mutations: false
  timeout_seconds: 300
  gate_ttl_seconds: 1800
telemetry:
  enabled: false
observability:
  log_archive_root: ~/.local/state/ml-expd/logs
  credential_root: ~/.local/state/ml-expd/credentials
  local_wandb:
    # Disabled by default. When enabled, the foreground command must bind all
    # three placeholders so daemon ownership, storage, and readiness agree.
    enabled: false
    managed: true
    bind_host: 127.0.0.1
    port: 8080
    data_dir: ~/.local/state/ml-expd/wandb
    # Empty selects ml-expd's attached Docker wrapper. An explicit replacement
    # must remain foreground and include all three placeholders.
    command: []
    docker_executable: /usr/bin/docker
    # Prefer an immutable @sha256 digest in operational deployments.
    image: wandb/local
    container_uid: 999
    # Publisher identity is separate from dashboard readiness. Set the W&B
    # entity/team only after the local server account exists.
    publisher_entity: null
    # Publishing requires a local-account API key. Provision this reference
    # through `ml-expd credential wandb set --stdin`; dashboard-only operation
    # can leave it null.
    publisher_credential_ref: null
  wandb_cloud:
    # Cloud sync is offered per submit/retry only when all three settings are
    # present and the referenced daemon-host credential is configured.
    enabled: false
    default_credential_ref: wandb-cloud-default
    entity: null
    api_url: https://api.wandb.ai
    dashboard_url: https://wandb.ai
collector_enabled: true
poll_interval_seconds: 20
projects: []
